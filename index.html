<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMG Platform — Global Mentors Group</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --venetian:#CE2702; --burnt:#5E1100; --narrow:#E2DED1; --nearblack:#111111;
  --cadmium:#B95300; --halfnarrow:#F2F1EE; --bgblack:#1A1A1A;
  --white:#FFFFFF; --muted:#7a7a7a; --border:#E2DED1;
  --success:#2d7a3a; --warn:#B95300; --info:#1a5a8a;
  --sidebar:248px; --topbar:56px; --radius:8px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Aptos','Segoe UI',system-ui,sans-serif;background:var(--halfnarrow);color:var(--nearblack);min-height:100vh}
h1,h2,h3,h4,.serif{font-family:Georgia,'Times New Roman',serif}
button{cursor:pointer;border:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}

/* Layout */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sidebar);background:var(--nearblack);color:#fff;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100}
#main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{height:var(--topbar);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--border)}
#content{padding:28px;flex:1}

/* Sidebar */
.sb-logo{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-icon{width:36px;height:36px;flex-shrink:0}
.sb-brand strong{display:block;font-family:Georgia,serif;font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.sb-brand span{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.8px;text-transform:uppercase}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-section{padding:8px 16px 2px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 14px;margin:1px 8px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.65);transition:.15s}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:var(--venetian);color:#fff}
.sb-item .ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-item .nb{margin-left:auto;background:var(--venetian);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-item.active .nb{background:rgba(255,255,255,.25)}
.sb-bottom{padding:12px 14px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{display:flex;align-items:center;gap:10px}
.sb-av{width:32px;height:32px;border-radius:50%;background:var(--venetian);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.sb-uinfo strong{font-size:12px;font-weight:600;display:block;color:#fff}
.sb-uinfo span{font-size:10px;color:rgba(255,255,255,.4)}

/* Topbar */
.tb-title{font-family:Georgia,serif;font-size:16px;font-weight:700;color:var(--nearblack);flex:1}
.tb-search{display:flex;align-items:center;gap:8px;background:var(--halfnarrow);border:1px solid var(--border);border-radius:6px;padding:5px 10px;width:220px}
.tb-search input{border:none;background:transparent;font-size:12px;color:var(--nearblack);width:100%}
.tb-search input::placeholder{color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;transition:.15s;cursor:pointer;border:none}
.btn-primary{background:var(--venetian);color:#fff}.btn-primary:hover{background:var(--burnt)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--nearblack)}.btn-outline:hover{background:var(--halfnarrow)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:5px}
.btn-success{background:var(--success);color:#fff}
.btn-warn{background:var(--cadmium);color:#fff}
.btn-xero{background:#13B5EA;color:#fff;font-weight:700}
.btn-xero:hover{background:#0d8ab5}
.btn-danger{background:#b91c1c;color:#fff}

/* Cards */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border)}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hdr h3{font-family:Georgia,serif;font-size:13px;font-weight:700;color:var(--nearblack)}
.card-body{padding:18px}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:18px;box-shadow:var(--shadow)}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-val{font-family:Georgia,serif;font-size:26px;font-weight:700;color:var(--nearblack);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px}
.kpi-bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.kpi-bar-fill{height:100%;background:var(--venetian);border-radius:2px}
.kpi.accent .kpi-val{color:var(--venetian)}
.kpi.gold .kpi-val{color:var(--cadmium)}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid var(--border);background:var(--halfnarrow)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafaf8}
.tbl .acts{display:flex;gap:5px}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.b-red{background:rgba(206,39,2,.1);color:var(--venetian)}
.b-green{background:rgba(45,122,58,.1);color:var(--success)}
.b-amber{background:rgba(185,83,0,.12);color:var(--cadmium)}
.b-grey{background:rgba(0,0,0,.07);color:var(--muted)}
.b-blue{background:rgba(26,90,138,.1);color:var(--info)}
.b-black{background:var(--nearblack);color:#fff}
.b-xero{background:#13B5EA;color:#fff}

/* Page header */
.phdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.phdr h2{font-family:Georgia,serif;font-size:19px;font-weight:700;color:var(--nearblack)}
.phdr p{font-size:12px;color:var(--muted);margin-top:3px}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--halfnarrow);border-radius:6px;padding:3px;margin-bottom:18px;width:fit-content;border:1px solid var(--border)}
.tab{padding:5px 14px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:.15s}
.tab.active{background:var(--white);color:var(--nearblack);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* Engagement type chips */
.type-chair{background:rgba(94,17,0,.1);color:var(--burnt);font-weight:700}
.type-executive{background:rgba(206,39,2,.1);color:var(--venetian);font-weight:700}
.type-team{background:rgba(185,83,0,.12);color:var(--cadmium);font-weight:700}

/* Progress */
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:4px 0}
.prog-fill{height:100%;background:var(--venetian);border-radius:3px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--white);border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;animation:fu .2s ease}
.modal-lg{max-width:720px}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.mhdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhdr h3{font-family:Georgia,serif;font-size:15px;font-weight:700}
.mbody{padding:22px}
.mfoot{padding:14px 22px;border-bottom-left-radius:10px;border-bottom-right-radius:10px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--halfnarrow)}
.mclose{width:28px;height:28px;border-radius:50%;background:var(--halfnarrow);border:none;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.mclose:hover{background:var(--border)}

/* Forms */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:11px;font-weight:700;color:var(--nearblack);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--nearblack);background:var(--halfnarrow);transition:.15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--venetian);background:#fff;box-shadow:0 0 0 3px rgba(206,39,2,.08)}
.fg textarea{resize:vertical;min-height:70px}
.fgrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fsep{border:none;border-top:1px solid var(--border);margin:10px 0}
.fstitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:8px 0 6px}

/* Finance items */
.fin-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
.fin-item:last-child{border-bottom:none}
.fin-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fin-info{flex:1}
.fin-info strong{font-size:12px;font-weight:600;display:block}
.fin-info span{font-size:11px;color:var(--muted)}
.fin-amount{font-family:Georgia,serif;font-size:14px;font-weight:700}

/* Xero banner */
.xero-banner{background:linear-gradient(135deg,#0e8ab0,#13B5EA);border-radius:8px;padding:14px 18px;color:#fff;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.xero-banner h4{font-size:13px;font-weight:700;margin-bottom:2px}
.xero-banner p{font-size:11px;opacity:.85}

/* Activity */
.act-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.act-item:last-child{border-bottom:none}
.act-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:var(--halfnarrow)}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ei{font-size:40px;opacity:.35;margin-bottom:10px}

/* Login */
#login{position:fixed;inset:0;background:var(--nearblack);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:var(--white);border-radius:12px;padding:36px 40px;width:360px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.login-logo svg{width:32px;height:32px}
.login-logo span{font-family:Georgia,serif;font-size:17px;font-weight:700}
.login-card h2{font-family:Georgia,serif;font-size:18px;margin-bottom:4px}
.login-card p{font-size:12px;color:var(--muted);margin-bottom:20px}

/* Lifecycle stages */
.lc-board{display:flex;gap:0;overflow-x:auto;padding-bottom:16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);box-shadow:var(--shadow)}
.lc-stage{flex:1;min-width:160px;border-right:1px solid var(--border);display:flex;flex-direction:column}
.lc-stage:last-child{border-right:none}
.lc-stage-hdr{padding:12px 10px;text-align:center;border-bottom:1px solid var(--border);position:relative}
.lc-stage-num{width:22px;height:22px;border-radius:50%;background:var(--venetian);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 5px}
.lc-stage-name{font-size:10px;font-weight:700;color:var(--nearblack);line-height:1.3;text-align:center}
.lc-stage-count{font-size:10px;color:var(--muted);margin-top:3px}
.lc-stage.active-stage .lc-stage-hdr{background:rgba(206,39,2,.04)}
.lc-cards{padding:8px;display:flex;flex-direction:column;gap:6px;flex:1;min-height:120px}
.lc-card{background:var(--halfnarrow);border:1px solid var(--border);border-radius:6px;padding:10px;cursor:pointer;transition:.15s;border-left:3px solid var(--venetian)}
.lc-card:hover{border-color:var(--venetian);box-shadow:0 2px 8px rgba(206,39,2,.12);transform:translateY(-1px)}
.lc-card-name{font-size:11px;font-weight:700;color:var(--nearblack);margin-bottom:4px;line-height:1.3}
.lc-card-meta{font-size:10px;color:var(--muted);line-height:1.5}
.lc-card-val{font-family:Georgia,serif;font-size:12px;font-weight:700;color:var(--cadmium);margin-top:5px}
.lc-card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.lc-add{margin:6px 8px;padding:5px;border:1.5px dashed var(--border);border-radius:5px;background:none;font-size:10px;color:var(--muted);cursor:pointer;width:calc(100% - 16px);transition:.15s}
.lc-add:hover{border-color:var(--venetian);color:var(--venetian)}

/* Filter row */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-row select{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;background:var(--white);color:var(--nearblack);cursor:pointer}
.filter-row select:focus{border-color:var(--venetian);outline:none}
.filter-clear{font-size:11px;color:var(--venetian);cursor:pointer;padding:4px 8px;border-radius:4px;background:rgba(206,39,2,.07);border:none;font-weight:600}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Info row */
.ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.ir:last-child{border-bottom:none}
.ir .lbl{color:var(--muted)}
.ir .val{font-weight:600}

@media(max-width:900px){.kpi-grid{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
</style>
</head>

function nav(el){
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  const v=el.dataset.v; S.view=v;
  document.getElementById('tbt').textContent=VIEWS[v]||v;
  const ab=document.getElementById('tba');
  if(TOPACT[v]){ab.textContent=TOPACT[v];ab.style.display='inline-flex'}else ab.style.display='none';
  renderView();
}

/* ── ENGAGEMENTS ─────────────────────────────────────────────── */

      ${allCountries.map(p=>`<option value="${p}" ${cf===p?'selected':''}>${p}</option>`).join('')}

      const val=e.type==='chair'?e.annualFee:e.type==='executive'?e.annualFee:e.totalFee;
      const tb={chair:'type-chair',executive:'type-executive',team:'type-team'}[e.type];

      return`<tr><td><div style="font-weight:600;font-size:12px">${e.name}</div><div style="font-size:10px;color:var(--muted)">${e.coordinator} · ${e.startDate}</div></td>
      <td><span class="badge ${tb}">${e.type}</span></td>

      <td style="font-size:12px">${mn?.name||'—'}</td>

  <div class="mbody">
    <div style="display:flex;gap:8px;margin-bottom:14px"><span class="badge ${tb}">${e.type}</span><span class="badge ${sb}">${e.status}</span></div>
    <div class="fstitle">Engagement Details</div>
    <div class="ir"><span class="lbl">Client</span><span class="val">${cl?.name||'—'}</span></div>
    <div class="ir"><span class="lbl">Mentor</span><span class="val">${mn?.name||'—'}</span></div>
    <div class="ir"><span class="lbl">Coordinator</span><span class="val">${e.coordinator}</span></div>
    <div class="ir"><span class="lbl">Partner</span><span class="val">${e.partner||'—'}</span></div>
    <div class="ir"><span class="lbl">Country</span><span class="val">${e.country||'—'}</span></div>
    <div class="ir"><span class="lbl">Dates</span><span class="val">${e.startDate} → ${e.endDate}</span></div>
    <div class="fstitle" style="margin-top:12px">Financial Terms</div>

      <div style="background:var(--halfnarrow);border-radius:6px;padding:12px;text-align:center">

function deleteEng(id){
  if(!confirm('Delete this engagement? This cannot be undone.')) return;
  DB.engagements=DB.engagements.filter(e=>e.id!==id);
  save(); closeModal(); renderView();
}

  <div class="tabs">

  </div>
  <div class="card">
    <table class="tbl"><thead><tr><th>Engagement</th><th>Date</th><th>Duration</th><th>Status</th><th>Mentor Payment</th><th>Actions</th></tr></thead>

      const e=DB.engagements.find(x=>x.id===s.engId);
      const mn=e?DB.contacts.find(m=>m.id===e.mentorId):null;
      const sb={scheduled:'b-blue',completed:'b-green',cancelled:'b-grey'}[s.status];
      return`<tr><td><div style="font-weight:600;font-size:12px">${e?.name||'—'}</div><div style="font-size:10px;color:var(--muted)">${mn?.name||'—'}</div></td>

      <td style="font-size:12px">${s.duration} min</td>
      <td><span class="badge ${sb}">${s.status}</span></td>
      <td>${s.status==='completed'?`<span class="badge ${s.mentorPaid?'b-green':'b-amber'}">${s.mentorPaid?'✓ paid':'pending'}</span>`:'<span class="badge b-grey">n/a</span>'}</td>
      <td><div class="acts">
        ${s.status==='scheduled'?`<button class="btn btn-sm btn-success" onclick="completeSession('${s.id}')">✓ Complete</button>`:''}
        ${s.status==='completed'&&!s.mentorPaid?`<button class="btn btn-sm btn-warn" onclick="paySession('${s.id}')">Pay Mentor</button>`:''}
        <button class="btn btn-sm btn-outline" onclick="viewSession('${s.id}')">View</button>
      </div></td></tr>`;
    }).join('')}</tbody></table>
  </div>`;
}

function completeSession(id){
  const s=DB.sessions.find(x=>x.id===id); if(!s) return;
  const e=DB.engagements.find(x=>x.id===s.engId);
  s.status='completed';
  if(e){e.sessionsUsed=(e.sessionsUsed||0)+1;}
  // Auto-generate mentor payment
  DB.mentorPayments.push({id:uid(),mentorId:e?.mentorId,engId:s.engId,sessionId:id,
    amount:e?.sessionRate||0,type:'chair-session',period:s.date.slice(0,7),
    status:'pending',autoBillId:null,xeroSynced:false,created:today()});
  addAct('◷',`Session completed: ${e?.name?.split('—')[0]||''} — mentor payment auto-generated (${fmt(e?.sessionRate||0)})`);
  save(); renderView();
}

function paySession(id){
  const s=DB.sessions.find(x=>x.id===id); if(!s) return;
  const mp=DB.mentorPayments.find(p=>p.sessionId===id);
  if(mp){mp.status='paid';mp.xeroSynced=true;}
  s.mentorPaid=true;
  save(); renderView();
}

function viewSession(id){
  const s=DB.sessions.find(x=>x.id===id); if(!s) return;
  const e=DB.engagements.find(x=>x.id===s.engId);
  const mn=e?DB.contacts.find(m=>m.id===e.mentorId):null;
  showModal(`<div class="mhdr"><h3>Session Detail</h3><button class="mclose" onclick="closeModal()">✕</button></div>
  <div class="mbody">
    <div class="ir"><span class="lbl">Engagement</span><span class="val">${e?.name||'—'}</span></div>
    <div class="ir"><span class="lbl">Mentor</span><span class="val">${mn?.name||'—'}</span></div>
    <div class="ir"><span class="lbl">Date</span><span class="val">${s.date}</span></div>
    <div class="ir"><span class="lbl">Duration</span><span class="val">${s.duration} minutes</span></div>
    <div class="ir"><span class="lbl">Status</span><span class="val"><span class="badge ${s.status==='completed'?'b-green':s.status==='scheduled'?'b-blue':'b-grey'}">${s.status}</span></span></div>
    <div class="ir"><span class="lbl">Mentor Rate</span><span class="val">${fmt(e?.sessionRate||0)}</span></div>
    <div class="ir"><span class="lbl">Payment</span><span class="val"><span class="badge ${s.mentorPaid?'b-green':'b-amber'}">${s.mentorPaid?'Paid':'Pending'}</span></span></div>
    ${s.notes?`<div style="margin-top:12px;padding:10px;background:var(--halfnarrow);border-radius:6px;font-size:12px">${s.notes}</div>`:''}
  </div>`);
}

/* ── CLIENT INVOICES ─────────────────────────────────────────── */
function rInvoices(c){

    <div style="display:flex;gap:10px;align-items:center">
      <span style="font-size:12px;color:var(--muted)">Outstanding: <strong style="color:var(--venetian)">${fmt(totalOut)}</strong></span>
      <span style="font-size:12px;color:var(--muted)">Paid: <strong style="color:var(--success)">${fmt(totalPaid)}</strong></span>
    </div>
  </div>
  ${DB.clientInvoices.filter(i=>!i.xeroSynced).length?`<div class="xero-banner"><div><h4>Xero Sync Required</h4><p>${DB.clientInvoices.filter(i=>!i.xeroSynced).length} invoices not yet pushed to Xero</p></div>
    <button class="btn btn-sm" style="background:#fff;color:#13B5EA;font-weight:700" onclick="pushAllXero()">Push All to Xero →</button></div>`:''}
  <div class="tabs">
    ${['all','draft','sent','paid','unsynced'].map(t=>`<div class="tab${tab===t?' active':''}" onclick="S.tab.inv='${t}';renderView()">${t.charAt(0).toUpperCase()+t.slice(1)} (${t==='all'?DB.clientInvoices.length:t==='unsynced'?DB.clientInvoices.filter(i=>!i.xeroSynced).length:DB.clientInvoices.filter(i=>i.status===t).length})</div>`).join('')}
  </div>
  <div class="card">
    <table class="tbl"><thead><tr><th>Invoice</th><th>Type</th><th>Client</th><th>Period</th><th>Amount</th><th>Due</th><th>Status</th><th>Xero</th><th>Actions</th></tr></thead>
    <tbody>${invs.map(inv=>{
      const cl=DB.contacts.find(c=>c.id===inv.clientId);
      const e=DB.engagements.find(x=>x.id===inv.engId);
      const sb={draft:'b-grey',sent:'b-blue',paid:'b-green'}[inv.status]||'b-grey';
      const tb={chair_annual:'type-chair','chair-annual':'type-chair','exec-quarterly':'type-executive','team-adhoc':'type-team'}[inv.type]||'b-grey';
      return`<tr><td><div style="font-weight:600;font-size:11px">${inv.id.toUpperCase()}</div><div style="font-size:10px;color:var(--muted)">${e?.name?.split('—')[0]?.trim()||'—'}</div></td>
      <td><span class="badge ${tb}" style="font-size:9px">${inv.type}</span></td>
      <td style="font-size:12px">${cl?.name||'—'}</td>
      <td style="font-size:11px">${inv.period}</td>
      <td style="font-family:Georgia,serif;font-weight:700">${fmt(inv.amount)}</td>
      <td style="font-size:11px;color:${inv.due<today()&&inv.status!=='paid'?'var(--venetian)':'inherit'}">${inv.due}</td>
      <td><span class="badge ${sb}">${inv.status}</span></td>
      <td><span class="badge ${inv.xeroSynced?'b-xero':'b-amber'}">${inv.xeroSynced?'✓ synced':'pending'}</span></td>

function sendInvoice(id){const i=DB.clientInvoices.find(x=>x.id===id);if(i){i.status='sent';addAct('◎',`Invoice sent: ${fmt(i.amount)} — ${i.period}`);save();renderView();}}
function markPaid(id){const i=DB.clientInvoices.find(x=>x.id===id);if(i){i.status='paid';save();renderView();}}
function pushInvXero(id){const i=DB.clientInvoices.find(x=>x.id===id);if(i){i.xeroSynced=true;addAct('◎',`Invoice pushed to Xero: ${fmt(i.amount)}`);save();renderView();}}

function runAutoBill(){
  const pending=DB.mentorPayments.filter(p=>p.status==='pending'&&!p.autoBillId);
  if(!pending.length){alert('No pending payments to process.');return;}
  const id=uid();
  const total=pending.reduce((s,p)=>s+p.amount,0);
  pending.forEach(p=>{p.autoBillId=id;p.status='paid';p.xeroSynced=true;});
  DB.autoBills.push({id,period:'2026-06',payments:pending.map(p=>p.id),totalAmount:total,status:'paid',xeroSynced:true,created:today()});
  addAct('◐',`Auto-bill run completed: June 2026 — ${fmt(total)} pushed to Xero`);
  save(); renderView();
  alert(`✓ Auto-bill run complete.\n${pending.length} payments totalling ${fmt(total)} pushed to Xero.`);
}

function saveQuote(id){
  if(!DB.quotes) DB.quotes=[];
  const name=document.getElementById('q-name').value.trim();
  if(!name)return alert('Please enter a name.');
  const data={name,clientId:document.getElementById('q-client').value,solution:document.getElementById('q-sol').value,value:parseFloat(document.getElementById('q-val').value)||0,partner:document.getElementById('q-partner').value,country:document.getElementById('q-country').value,validUntil:document.getElementById('q-valid').value,notes:document.getElementById('q-notes').value.trim()};
  if(id){const q=DB.quotes.find(x=>x.id===id);if(q)Object.assign(q,data);}
  else{DB.quotes.unshift({id:uid(),date:today(),status:'draft',...data});}
  addAct('◎',`Quote ${id?'updated':'created'}: ${name}`);save();closeModal();renderView();
}
function sendQuote(id){const q=DB.quotes.find(x=>x.id===id);if(q){q.status='sent';addAct('◎',`Quote sent: ${q.name}`);save();renderView();}}
function approveQuote(id){const q=DB.quotes.find(x=>x.id===id);if(q){q.status='approved';addAct('◎',`Quote approved: ${q.name} — ${fmt(q.value)}`);save();renderView();}}
function deleteQuote(id){if(!confirm('Delete this quote?'))return;DB.quotes=DB.quotes.filter(x=>x.id!==id);save();renderView();}

function rCostMgmt(c){

  <div class="phdr"><div><h2>Cost Management</h2><p>Mentor payments, billing runs &amp; Xero sync</p></div></div>

    <div class="tab${tab==='payments'?' active':''}" onclick="S.tab.cost='payments';renderView()">Mentor Payments</div>

/* ── TASKS ───────────────────────────────────────────────────── */
function rTasks(c){
  const viewMode=S.tab.taskView||'list';
  const prFilter=S.tab.taskPri||'';
  const assFilter=S.tab.taskAss||'';
  const stFilter=S.tab.taskSt||'all';
  let tasks=DB.tasks.filter(t=>{
    if(stFilter==='active'&&t.status==='done') return false;
    if(stFilter==='done'&&t.status!=='done') return false;
    if(prFilter&&t.priority!==prFilter) return false;
    if(assFilter&&t.assignee!==assFilter) return false;
    return true;
  });
  const overdue=DB.tasks.filter(t=>t.status!=='done'&&t.due&&t.due<today()).length;
  const hasFilter=prFilter||assFilter||stFilter!=='all';
  c.innerHTML=`
  <div class="phdr"><div><h2>Tasks</h2><p>${DB.tasks.filter(t=>t.status!=='done').length} open · ${overdue>0?`<span style="color:var(--venetian)">${overdue} overdue</span>`:'none overdue'}</p></div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
    <select class="filter-sel" onchange="S.tab.taskSt=this.value;renderView()">
      <option value="all"${stFilter==='all'?' selected':''}>All Tasks</option>
      <option value="active"${stFilter==='active'?' selected':''}>Open</option>
      <option value="done"${stFilter==='done'?' selected':''}>Completed</option>
    </select>
    <select class="filter-sel" onchange="S.tab.taskPri=this.value;renderView()">
      <option value="">All Priorities</option>
      ${['high','medium','low'].map(p=>`<option value="${p}"${prFilter===p?' selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
    </select>
    <select class="filter-sel" onchange="S.tab.taskAss=this.value;renderView()">
      <option value="">All Assignees</option>
      ${PARTNERS.map(p=>`<option value="${p}"${assFilter===p?' selected':''}>${p}</option>`).join('')}
    </select>
    ${hasFilter?`<button class="filter-clear" onclick="S.tab.taskPri='';S.tab.taskAss='';S.tab.taskSt='all';renderView()">✕ Clear</button>`:''}
    <div style="margin-left:auto;display:flex;gap:4px">
      <button class="btn btn-sm${viewMode==='list'?' btn-primary':' btn-outline'}" onclick="S.tab.taskView='list';renderView()">☰ List</button>
      <button class="btn btn-sm${viewMode==='board'?' btn-primary':' btn-outline'}" onclick="S.tab.taskView='board';renderView()">▦ Board</button>
    </div>
  </div>
  ${viewMode==='board'?taskBoard(tasks):taskList(tasks)}`;
}
function taskList(tasks){
  const priBadge={high:'b-red',medium:'b-amber',low:'b-grey'};
  return`<div class="card">
    <table class="tbl"><thead><tr><th style="width:32px"></th><th>Task</th><th>Priority</th><th>Assignee</th><th>Due</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${tasks.map(t=>{
      const pb=priBadge[t.priority]||'b-grey';
      const overdue=t.status!=='done'&&t.due&&t.due<today();
      return`<tr style="${t.status==='done'?'opacity:.55':''}">
        <td><input type="checkbox" ${t.status==='done'?'checked':''} onchange="toggleTask('${t.id}',this.checked)" style="cursor:pointer;width:16px;height:16px;accent-color:var(--venetian)"></td>
        <td><div style="font-weight:600;font-size:12px;${t.status==='done'?'text-decoration:line-through;color:var(--muted)':''}">${t.title}</div>
          ${t.notes?`<div style="font-size:10px;color:var(--muted);margin-top:1px">${t.notes.slice(0,70)}${t.notes.length>70?'…':''}</div>`:''}</td>
        <td><span class="badge ${pb}">${t.priority}</span></td>
        <td style="font-size:11px">${t.assignee||'—'}</td>
        <td style="font-size:11px;${overdue?'color:var(--venetian);font-weight:700':''}">${t.due||'—'}${overdue?' ⚠':''}</td>
        <td><span class="badge ${t.status==='done'?'b-green':t.status==='inprogress'?'b-blue':'b-grey'}">${t.status==='inprogress'?'In Progress':t.status==='done'?'Done':'To Do'}</span></td>
        <td><div class="acts">
          <button class="btn btn-sm btn-outline" onclick="openTaskModal('${t.id}')">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteTask('${t.id}')">×</button>
        </div></td>
      </tr>`;
    }).join('')}
    ${tasks.length===0?`<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted)">No tasks found.</td></tr>`:''}</tbody></table>
  </div>`;
}
function taskBoard(tasks){
  const cols=[{key:'todo',label:'To Do',badge:'b-grey'},{key:'inprogress',label:'In Progress',badge:'b-blue'},{key:'done',label:'Done',badge:'b-green'}];
  const priBadge={high:'b-red',medium:'b-amber',low:'b-grey'};
  return`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    ${cols.map(col=>{
      const colTasks=tasks.filter(t=>t.status===col.key);
      return`<div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span class="badge ${col.badge}">${col.label}</span>
          <span style="font-size:11px;color:var(--muted)">${colTasks.length}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${colTasks.map(t=>{
            const pb=priBadge[t.priority]||'b-grey';
            const overdue=col.key!=='done'&&t.due&&t.due<today();
            return`<div class="card" style="padding:12px;cursor:pointer" onclick="openTaskModal('${t.id}')">
              <div style="font-weight:600;font-size:12px;margin-bottom:6px">${t.title}</div>
              ${t.notes?`<div style="font-size:10px;color:var(--muted);margin-bottom:6px">${t.notes.slice(0,60)}…</div>`:''}
              <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
                <span class="badge ${pb}">${t.priority}</span>
                ${t.due?`<span style="font-size:10px;color:${overdue?'var(--venetian)':'var(--muted)'}">${t.due}${overdue?' ⚠':''}</span>`:''}
              </div>
              ${t.assignee?`<div style="font-size:10px;color:var(--muted);margin-top:6px">👤 ${t.assignee}</div>`:''}
            </div>`;
          }).join('')}
          <button class="btn btn-sm btn-outline" style="width:100%;justify-content:center" onclick="openTaskModal(null,'${col.key}')">+ Add task</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}
function toggleTask(id,checked){const t=DB.tasks.find(x=>x.id===id);if(t){t.status=checked?'done':'todo';save();renderView();}}
function deleteTask(id){if(!confirm('Delete task?'))return;DB.tasks=DB.tasks.filter(x=>x.id!==id);save();renderView();}
function openTaskModal(id,defaultStatus){
  const t=id?DB.tasks.find(x=>x.id===id):null;
  const defSt=defaultStatus||'todo';
  showModal(`<div class="mhdr"><h3>${t?'Edit Task':'New Task'}</h3><button class="mclose" onclick="closeModal()">✕</button></div>
  <div class="mbody">
    <div class="fg"><label>Title</label><input id="tk-title" class="fi" placeholder="Task title" value="${t?t.title:''}"></div>
    <div class="ir2">
      <div class="fg"><label>Assignee</label><select id="tk-ass" class="fi">
        <option value="">— Unassigned —</option>
        ${PARTNERS.map(p=>`<option value="${p}"${t&&t.assignee===p?' selected':''}>${p}</option>`).join('')}
      </select></div>
      <div class="fg"><label>Status</label><select id="tk-st" class="fi">
        ${[{v:'todo',l:'To Do'},{v:'inprogress',l:'In Progress'},{v:'done',l:'Done'}].map(s=>`<option value="${s.v}"${(t?t.status:defSt)===s.v?' selected':''}>${s.l}</option>`).join('')}
      </select></div>
    </div>
    <div class="ir2">
      <div class="fg"><label>Priority</label><select id="tk-pri" class="fi">
        ${['high','medium','low'].map(p=>`<option value="${p}"${t&&t.priority===p?' selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
      </select></div>
      <div class="fg"><label>Due Date</label><input type="date" id="tk-due" class="fi" value="${t?t.due||'':''}"></div>
    </div>
    <div class="fg"><label>Notes</label><textarea id="tk-notes" class="fi" rows="3">${t?t.notes||'':''}</textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask('${id||''}')">Save Task</button>
    </div>
  </div>`);
}
function saveTask(id){
  const title=document.getElementById('tk-title').value.trim();
  if(!title)return alert('Please enter a title.');
  const data={title,assignee:document.getElementById('tk-ass').value,status:document.getElementById('tk-st').value,priority:document.getElementById('tk-pri').value,due:document.getElementById('tk-due').value,notes:document.getElementById('tk-notes').value.trim()};
  if(id){const t=DB.tasks.find(x=>x.id===id);if(t)Object.assign(t,data);}
  else{DB.tasks.unshift({id:uid(),ref:null,type:'general',...data});}
  addAct('◻',`Task ${id?'updated':'created'}: ${title}`);save();closeModal();renderView();
}

/* ── LIFECYCLE ───────────────────────────────────────────────── */
function rLifecycle(c){
  const pf=S.tab.lcPartner||''; const cf=S.tab.lcCountry||''; const sf=S.tab.lcSol||'';
  let opps=(DB.opportunities||[]).filter(o=>{
    if(pf&&o.partner!==pf) return false;
    if(cf&&o.country!==cf) return false;
    if(sf&&o.solution!==sf) return false;
    return true;
  });
  const allP=[...new Set((DB.opportunities||[]).map(o=>o.partner).filter(Boolean))];
  const allC=[...new Set((DB.opportunities||[]).map(o=>o.country).filter(Boolean))];
  const totalVal=opps.filter(o=>o.stage!=='Closed Won').reduce((s,o)=>s+o.value,0);
  const wonVal=opps.filter(o=>o.stage==='Closed Won').reduce((s,o)=>s+o.value,0);
  const hasFilter=pf||cf||sf;

  // Stage display config — merge "Mentee Identified" and "Proposal Sent" into one column
  const DISPLAY_STAGES=[
    {key:'Lead',label:'Prospect / Lead',num:1,desc:'Initial enquiry or warm introduction'},
    {key:'Qualified',label:'Qualified Opportunity',num:2,desc:'Need confirmed and budget indicated'},
    {key:'Mentee Identified',label:'Mentee Identified / Proposal Sent',num:3,desc:'Mentee confirmed and proposal delivered',keys:['Mentee Identified','Proposal Sent']},
    {key:'Proposal Accepted',label:'Proposal Accepted',num:4,desc:'Client has agreed to proceed'},
    {key:'Client Intro',label:'Client Intro',num:5,desc:'Introduction meetings completed'},
    {key:'Contracting',label:'Contracting',num:6,desc:'Contract under review and signature'},
    {key:'Closed Won',label:'Closed Won',num:7,desc:'Engagement live and active'},
  ];

  c.innerHTML=`
  <div class="phdr">
    <div><h2>Lifecycle</h2><p>Track every opportunity from first contact to closed engagement</p></div>
    <div style="display:flex;gap:12px;align-items:center">
      <span style="font-size:12px;color:var(--muted)">Open pipeline: <strong style="color:var(--venetian)">${fmt(totalVal)}</strong></span>
      <span style="font-size:12px;color:var(--muted)">Closed: <strong style="color:var(--success)">${fmt(wonVal)}</strong></span>
    </div>
  </div>
  <div class="filter-row" style="margin-bottom:14px">
    <select onchange="S.tab.lcPartner=this.value;renderView()">
      <option value="">All Partners</option>
      ${allP.map(p=>`<option value="${p}" ${pf===p?'selected':''}>${p}</option>`).join('')}
    </select>
    <select onchange="S.tab.lcCountry=this.value;renderView()">
      <option value="">All Countries</option>
      ${allC.map(p=>`<option value="${p}" ${cf===p?'selected':''}>${p}</option>`).join('')}
    </select>
    <select onchange="S.tab.lcSol=this.value;renderView()">
      <option value="">All Solutions</option>
      <option value="chair" ${sf==='chair'?'selected':''}>Chair Mentoring</option>
      <option value="executive" ${sf==='executive'?'selected':''}>Executive Mentoring</option>
      <option value="team" ${sf==='team'?'selected':''}>Team Engagement</option>
    </select>
    ${hasFilter?`<button class="filter-clear" onclick="S.tab.lcPartner='';S.tab.lcCountry='';S.tab.lcSol='';renderView()">✕ Clear</button>`:''}
    <span style="font-size:11px;color:var(--muted)">${opps.length} opportunit${opps.length!==1?'ies':'y'}</span>
  </div>
  <div class="lc-board">
    ${DISPLAY_STAGES.map((stage,idx)=>{
      const stageKeys=stage.keys||[stage.key];
      const stageOpps=opps.filter(o=>stageKeys.includes(o.stage));
      const stageVal=stageOpps.reduce((s,o)=>s+o.value,0);
      const isWon=stage.key==='Closed Won';
      return`<div class="lc-stage${stageOpps.length?' active-stage':''}">
        <div class="lc-stage-hdr">
          <div class="lc-stage-num" style="background:${isWon?'var(--success)':'var(--venetian)'}">${stage.num}</div>
          <div class="lc-stage-name">${stage.label}</div>
          <div class="lc-stage-count">${stageOpps.length} · ${stageVal?fmt(stageVal):''}</div>
        </div>
        <div class="lc-cards">
          ${stageOpps.map(o=>{
            const solBadge={chair:'type-chair',executive:'type-executive',team:'type-team'}[o.solution]||'b-grey';
            return`<div class="lc-card" onclick="openOppDetail('${o.id}')">
              <div class="lc-card-name">${o.name}</div>
              <div class="lc-card-meta">${o.partner||''} · ${o.country||''}</div>
              <div class="lc-card-val">${fmt(o.value)}</div>
              <div class="lc-card-tags"><span class="badge ${solBadge}" style="font-size:9px">${o.solution}</span></div>
            </div>`;
          }).join('')}
        </div>
        <button class="lc-add" onclick="openOppModal(null,'${stage.key}')">+ Add</button>
      </div>`;
    }).join('')}
  </div>`;
}

function openOppDetail(id){

  const sb={chair:'type-chair',executive:'type-executive',team:'type-team'}[o.solution]||'b-grey';
  const DISPLAY_STAGES=[
    {key:'Lead',label:'1 · Prospect / Lead'},{key:'Qualified',label:'2 · Qualified'},
    {key:'Mentee Identified',label:'3 · Mentee Identified'},{key:'Proposal Sent',label:'3 · Proposal Sent'},
    {key:'Proposal Accepted',label:'4 · Proposal Accepted'},{key:'Client Intro',label:'5 · Client Intro'},
    {key:'Contracting',label:'6 · Contracting'},{key:'Closed Won',label:'7 · Closed Won'},
  ];
  showModal(`<div class="mhdr"><h3>Opportunity Detail</h3><button class="mclose" onclick="closeModal()">✕</button></div>
  <div class="mbody">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div>
        <h3 style="font-family:Georgia,serif;font-size:15px;margin-bottom:4px">${o.name}</h3>
        <span class="badge ${sb}">${o.solution}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-outline" onclick="closeModal();openOppModal('${o.id}')">✏ Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteOpp('${o.id}')">Delete</button>
      </div>
    </div>
    <div class="ir"><span class="lbl">Stage</span><span class="val"><span class="badge b-black">${o.stage}</span></span></div>

    <div class="ir"><span class="lbl">Value</span><span class="val" style="font-family:Georgia,serif;font-size:15px;color:var(--cadmium)">${fmt(o.value)}</span></div>
    <div class="ir"><span class="lbl">Partner</span><span class="val">${o.partner||'—'}</span></div>
    <div class="ir"><span class="lbl">Country</span><span class="val">${o.country||'—'}</span></div>
    <div class="ir"><span class="lbl">Created</span><span class="val">${o.created||'—'}</span></div>
    ${o.notes?`<div style="margin-top:12px;padding:10px;background:var(--halfnarrow);border-radius:6px;font-size:12px">${o.notes}</div>`:''}
    <div style="margin-top:16px">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px">Move to Stage</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${DISPLAY_STAGES.filter(s=>s.key!==o.stage).map(s=>`<button class="btn btn-sm btn-outline" onclick="moveOpp('${o.id}','${s.key}')">${s.label}</button>`).join('')}
      </div>
    </div>
  </div>`);
}

function moveOpp(id,stage){
  const o=(DB.opportunities||[]).find(x=>x.id===id);
  if(o){o.stage=stage;addAct('◎',`Opportunity "${o.name}" moved to ${stage}`);save();closeModal();renderView();}
}
function deleteOpp(id){
  if(!confirm('Delete this opportunity?')) return;
  DB.opportunities=(DB.opportunities||[]).filter(x=>x.id!==id);
  save();closeModal();renderView();
}
