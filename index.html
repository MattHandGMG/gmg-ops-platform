<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMG Platform — Global Mentors Group</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
:root {
  --venetian:#CE2702; --burnt:#5E1100; --narrow:#E2DED1; --nearblack:#111111;
  --cadmium:#B95300; --halfnarrow:#F2F1EE; --bgblack:#1A1A1A;
  --white:#FFFFFF; --muted:#7a7a7a; --border:#E2DED1;
  --success:#2d7a3a; --warn:#B95300; --info:#1a5a8a;
  --sidebar:248px; --topbar:56px; --radius:8px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--halfnarrow);color:var(--nearblack);min-height:100vh}
h1,h2,h3,h4,.serif{font-family:'Cormorant Garamond',Georgia,serif}
button{cursor:pointer;border:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}

/* Layout */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sidebar);background:var(--nearblack);color:#fff;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100}
#main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{height:52px;background:#5E1100;color:#fff;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 28px;gap:0;position:sticky;top:0;z-index:50;box-shadow:0 1px 6px rgba(0,0,0,.35)}
#content{padding:28px;flex:1}

/* Sidebar */
.sb-logo{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;background:var(--burnt)}
.sb-icon{width:36px;height:36px;flex-shrink:0}
.sb-brand strong{display:block;font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;font-weight:700;color:#fff;line-height:1.2}
.sb-brand span{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.8px;text-transform:uppercase}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-section{padding:8px 16px 2px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 14px;margin:1px 8px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.65);transition:.15s}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:var(--venetian);color:#fff}
.sb-item .ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-item .nb{margin-left:auto;background:var(--venetian);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-item.active .nb{background:rgba(255,255,255,.25)}
.sb-bottom{padding:12px 14px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{display:flex;align-items:center;gap:10px}
.sb-av{width:32px;height:32px;border-radius:50%;background:var(--venetian);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.sb-uinfo strong{font-size:12px;font-weight:600;display:block;color:#fff}
.sb-uinfo span{font-size:10px;color:rgba(255,255,255,.4)}

/* Topbar */
.tb-logo{display:flex;align-items:center;gap:10px;padding-right:28px;border-right:1px solid rgba(255,255,255,.18);margin-right:24px;flex-shrink:0}
.tb-brand{font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:.01em}
.tb-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;font-weight:600;color:rgba(255,255,255,.7);flex:1}
.tb-search{display:flex;align-items:center;gap:8px;cursor:pointer;color:rgba(255,255,255,.75);font-size:13px;font-weight:500;padding:5px 0;border:none;background:transparent}
.tb-search input{border:none;background:transparent;font-size:13px;color:#fff;width:120px;cursor:pointer}
.tb-search input::placeholder{color:rgba(255,255,255,.6)}
.tb-search svg{opacity:.7}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;transition:.15s;cursor:pointer;border:none}
.btn-primary{background:var(--venetian);color:#fff}.btn-primary:hover{background:var(--burnt)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--nearblack)}.btn-outline:hover{background:var(--halfnarrow)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:5px}
.btn-success{background:var(--success);color:#fff}
.btn-warn{background:var(--cadmium);color:#fff}
.btn-xero{background:#13B5EA;color:#fff;font-weight:700}
.btn-xero:hover{background:#0d8ab5}
.btn-danger{background:#b91c1c;color:#fff}

/* Cards */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border)}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hdr h3{font-family:'Cormorant Garamond',Georgia,serif;font-size:13px;font-weight:700;color:var(--nearblack)}
.card-body{padding:18px}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:18px;box-shadow:var(--shadow)}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-val{font-family:'Cormorant Garamond',Georgia,serif;font-size:26px;font-weight:700;color:var(--nearblack);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px}
.kpi-bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.kpi-bar-fill{height:100%;background:var(--venetian);border-radius:2px}
.kpi.accent .kpi-val{color:var(--venetian)}
.kpi.gold .kpi-val{color:var(--cadmium)}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid var(--border);background:var(--halfnarrow)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafaf8}
.tbl .acts{display:flex;gap:5px}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.b-red{background:rgba(206,39,2,.1);color:var(--venetian)}
.b-green{background:rgba(45,122,58,.1);color:var(--success)}
.b-amber{background:rgba(185,83,0,.12);color:var(--cadmium)}
.b-grey{background:rgba(0,0,0,.07);color:var(--muted)}
.b-blue{background:rgba(26,90,138,.1);color:var(--info)}
.b-black{background:var(--nearblack);color:#fff}
.b-xero{background:#13B5EA;color:#fff}

/* Page header */
.phdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.phdr h2{font-family:'Cormorant Garamond',Georgia,serif;font-size:19px;font-weight:700;color:var(--nearblack)}
.phdr p{font-size:12px;color:var(--muted);margin-top:3px}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--halfnarrow);border-radius:6px;padding:3px;margin-bottom:18px;width:fit-content;border:1px solid var(--border)}
.tab{padding:5px 14px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);transition:.15s}
.tab.active{background:var(--white);color:var(--nearblack);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* Engagement type chips */
.type-chair{background:rgba(94,17,0,.1);color:var(--burnt);font-weight:700}
.type-executive{background:rgba(206,39,2,.1);color:var(--venetian);font-weight:700}
.type-team{background:rgba(185,83,0,.12);color:var(--cadmium);font-weight:700}

/* Progress */
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:4px 0}
.prog-fill{height:100%;background:var(--venetian);border-radius:3px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--white);border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;animation:fu .2s ease}
.modal-lg{max-width:720px}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.mhdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhdr h3{font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;font-weight:700}
.mbody{padding:22px}
.mfoot{padding:14px 22px;border-bottom-left-radius:10px;border-bottom-right-radius:10px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--halfnarrow)}
.mclose{width:28px;height:28px;border-radius:50%;background:var(--halfnarrow);border:none;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.mclose:hover{background:var(--border)}

/* Forms */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:11px;font-weight:700;color:var(--nearblack);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--nearblack);background:var(--halfnarrow);transition:.15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--venetian);background:#fff;box-shadow:0 0 0 3px rgba(206,39,2,.08)}
.fg textarea{resize:vertical;min-height:70px}
.fgrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fsep{border:none;border-top:1px solid var(--border);margin:10px 0}
.fstitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:8px 0 6px}

/* Finance items */
.fin-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
.fin-item:last-child{border-bottom:none}
.fin-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fin-info{flex:1}
.fin-info strong{font-size:12px;font-weight:600;display:block}
.fin-info span{font-size:11px;color:var(--muted)}
.fin-amount{font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;font-weight:700}

/* Xero banner */
.xero-banner{background:linear-gradient(135deg,#0e8ab0,#13B5EA);border-radius:8px;padding:14px 18px;color:#fff;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.xero-banner h4{font-size:13px;font-weight:700;margin-bottom:2px}
.xero-banner p{font-size:11px;opacity:.85}

/* Activity */
.act-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.act-item:last-child{border-bottom:none}
.act-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:var(--halfnarrow)}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ei{font-size:40px;opacity:.35;margin-bottom:10px}

/* Login */
#login{position:fixed;inset:0;background:var(--nearblack);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:var(--white);border-radius:12px;padding:36px 40px;width:360px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-logo svg{width:40px;height:40px}
.login-logo span{font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;font-weight:700;letter-spacing:-0.3px}
.login-card h2{font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;margin-bottom:4px}
.login-card p{font-size:12px;color:var(--muted);margin-bottom:20px}

/* Lifecycle stages */
.lc-board{display:flex;gap:0;overflow-x:auto;padding-bottom:16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--white);box-shadow:var(--shadow)}
.lc-stage{flex:1;min-width:160px;border-right:1px solid var(--border);display:flex;flex-direction:column}
.lc-stage:last-child{border-right:none}
.lc-stage-hdr{padding:12px 10px;text-align:center;border-bottom:1px solid var(--border);position:relative}
.lc-stage-num{width:22px;height:22px;border-radius:50%;background:var(--venetian);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 5px}
.lc-stage-name{font-size:10px;font-weight:700;color:var(--nearblack);line-height:1.3;text-align:center}
.lc-stage-count{font-size:10px;color:var(--muted);margin-top:3px}
.lc-stage.active-stage .lc-stage-hdr{background:rgba(206,39,2,.04)}
.lc-cards{padding:8px;display:flex;flex-direction:column;gap:6px;flex:1;min-height:120px}
.lc-card{background:var(--halfnarrow);border:1px solid var(--border);border-radius:6px;padding:10px;cursor:pointer;transition:.15s;border-left:3px solid var(--venetian)}
.lc-card:hover{border-color:var(--venetian);box-shadow:0 2px 8px rgba(206,39,2,.12);transform:translateY(-1px)}
.lc-card-name{font-size:11px;font-weight:700;color:var(--nearblack);margin-bottom:4px;line-height:1.3}
.lc-card-meta{font-size:10px;color:var(--muted);line-height:1.5}
.lc-card-val{font-family:'Cormorant Garamond',Georgia,serif;font-size:12px;font-weight:700;color:var(--cadmium);margin-top:5px}
.lc-card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.lc-add{margin:6px 8px;padding:5px;border:1.5px dashed var(--border);border-radius:5px;background:none;font-size:10px;color:var(--muted);cursor:pointer;width:calc(100% - 16px);transition:.15s}
.lc-add:hover{border-color:var(--venetian);color:var(--venetian)}

/* Filter row */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-row select,.filter-sel{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;background:var(--white);color:var(--nearblack);cursor:pointer}
.filter-row select:focus,.filter-sel:focus{border-color:var(--venetian);outline:none}
.filter-clear{font-size:11px;color:var(--venetian);cursor:pointer;padding:4px 8px;border-radius:4px;background:rgba(206,39,2,.07);border:none;font-weight:600}

/* Kanban */
.kanban-board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}
.kanban-col{background:var(--halfnarrow);border-radius:8px;padding:12px;border:1px solid var(--border)}
.kanban-col-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.kanban-card{background:var(--white);border-radius:6px;padding:12px;margin-bottom:8px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:.15s}
.kanban-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.1);transform:translateY(-1px)}
.kanban-card-title{font-size:12px;font-weight:600;margin-bottom:6px;color:var(--nearblack)}
.kanban-card-meta{font-size:10px;color:var(--muted)}

/* Report cards */
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.report-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px}
.report-card h3{font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;font-weight:700}
.report-card p{font-size:12px;color:var(--muted);flex:1}

/* Mentor cards */
.mentor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.mentor-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}
.mentor-av{width:44px;height:44px;border-radius:50%;background:var(--venetian);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',Georgia,serif;font-size:16px;font-weight:700;flex-shrink:0}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Info row */
.ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.ir:last-child{border-bottom:none}
.ir .lbl{color:var(--muted)}
.ir .val{font-weight:600}

@media(max-width:900px){.kpi-grid{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}

/* Login states */
.login-err{color:#b91c1c;font-size:12px;margin-top:6px;padding:6px 10px;background:rgba(185,28,28,.08);border-radius:5px;display:none}
.login-ok{color:#15803d;font-size:12px;margin-top:6px;padding:6px 10px;background:rgba(21,128,61,.08);border-radius:5px;display:none}
#login-form a,#signup-form a{color:var(--venetian);text-decoration:none}
#login-form a:hover,#signup-form a:hover{text-decoration:underline}
/* Sync indicator */
.sync-dot{width:7px;height:7px;border-radius:50%;background:#2d7a3a;display:inline-block;margin-left:6px;vertical-align:middle}
.sync-dot.syncing{background:var(--cadmium)}
.sync-dot.offline{background:#b91c1c}
/* Logout button */
.sb-logout{width:100%;margin-top:8px;padding:6px 10px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1);border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.3px;transition:.15s}
.sb-logout:hover{background:rgba(185,28,28,.3);color:#fff;border-color:rgba(185,28,28,.4)}
/* Claude Chat Bar */
#claude-bar{position:fixed;bottom:0;left:var(--sidebar);right:0;z-index:200;background:var(--white);border-top:1px solid var(--border);padding:8px 20px;display:none;align-items:center;gap:10px;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
#claude-input{flex:1;border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:13px;background:var(--halfnarrow);color:var(--nearblack)}
#claude-input:focus{border-color:var(--venetian);outline:none;background:#fff}
#claude-panel{position:fixed;bottom:49px;left:var(--sidebar);right:0;z-index:199;background:var(--white);border-top:1px solid var(--border);padding:16px 24px 12px;max-height:280px;overflow-y:auto;display:none;box-shadow:0 -4px 16px rgba(0,0,0,.07);font-size:13px;line-height:1.7}
#claude-panel.open{display:block}
.cp-q{color:var(--muted);margin-bottom:8px;font-style:italic;font-size:12px}
.cp-a{color:var(--nearblack)}
.cp-close{position:absolute;top:10px;right:16px;background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted);line-height:1}
/* Extra bottom padding so content doesn't hide behind Claude bar */
#content{padding-bottom:64px}
/* Project Management — stages & profitability */
.proj-stage-pip{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.profit-bar-track{height:10px;border-radius:5px;overflow:hidden;background:var(--border);display:flex;margin:4px 0}
.pbar-cost{background:#c0392b;height:100%;transition:.3s}
.pbar-profit{background:#27ae60;height:100%;transition:.3s}
.mentor-tag{display:inline-flex;align-items:center;gap:4px;background:var(--halfnarrow);border:1px solid var(--border);border-radius:12px;padding:3px 9px;font-size:11px;font-weight:600}
.mentor-tag button{background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted);padding:0;line-height:1;margin-left:2px}
.mentor-tag button:hover{color:#c0392b}
.mc-list{display:flex;flex-direction:column;gap:4px;padding:8px 10px;background:var(--halfnarrow);border-radius:6px;border:1px solid var(--border);max-height:180px;overflow-y:auto}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
<div class="login-card">

const SK='gmg_v2';
let _syncTimer=null;
function save(){
  try{localStorage.setItem(SK,JSON.stringify(DB));}catch(e){}
  setSyncDot('syncing');
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(syncToSupabase,600);
}
async function syncToSupabase(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){setSyncDot('offline');return;}
  try{
    for(const[dbKey,table]of Object.entries(SB_TABLES)){
      const rows=DB[dbKey];
      if(!rows||!rows.length)continue;
      await sb.from(table).upsert(rows.map(r=>({id:r.id,data:r,updated_at:new Date().toISOString()})),{ignoreDuplicates:false});
    }
    setSyncDot('ok');
  }catch(e){setSyncDot('offline');console.warn('Supabase sync error',e);}
}
function setSyncDot(state){
  const d=document.getElementById('sync-dot');
  if(!d)return;
  d.className='sync-dot'+(state==='syncing'?' syncing':state==='offline'?' offline':'');
  d.title=state==='ok'?'Data synced':state==='syncing'?'Saving…':'Offline — changes saved locally';
}

async function doLogin(){
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  document.getElementById('login-err').style.display='none';
  if(!email||!pass)return _loginErr('Please enter your email and password.');
  const btn=document.getElementById('login-btn');
  btn.textContent='Signing in…';btn.disabled=true;
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.textContent='Sign In';btn.disabled=false;
  if(error)return _loginErr(error.message);

async function doSignup(){
  const name=document.getElementById('su-name').value.trim();
  const email=document.getElementById('su-email').value.trim();
  const pass=document.getElementById('su-pass').value;
  const role=document.getElementById('su-role').value;
  document.getElementById('signup-err').style.display='none';
  document.getElementById('signup-ok').style.display='none';
  if(!name||!email||!pass)return _signupErr('Please fill in all fields.');
  if(pass.length<8)return _signupErr('Password must be at least 8 characters.');
  const btn=document.getElementById('signup-btn');
  btn.textContent='Creating…';btn.disabled=true;
  const{data,error}=await sb.auth.signUp({email,password:pass});
  btn.textContent='Create Account';btn.disabled=false;
  if(error)return _signupErr(error.message);
  if(data.user){
    await sb.from('profiles').upsert({id:data.user.id,data:{name,role,entity:'GMG'},updated_at:new Date().toISOString()});
    _signupOk('Account created! Check your email to confirm, then sign in.');
  }
}

async function bootApp(user){
  const{data:prof}=await sb.from('profiles').select('data').eq('id',user.id).single();
  if(prof&&prof.data){S.user.name=prof.data.name||user.email.split('@')[0];S.user.role=prof.data.role||'rm';}
  else{S.user.name=user.email.split('@')[0];S.user.role='rm';}
  await loadAllData();
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('claude-bar').style.display='flex';
  document.getElementById('sun').textContent=S.user.name;
  document.getElementById('sav').textContent=S.user.name.charAt(0).toUpperCase();
  document.getElementById('sur').textContent=ROLES[S.user.role]||S.user.role;
  setupRealtime();
  nav(document.querySelector('[data-v="dashboard"]'));
}

async function loadAllData(){
  try{
    const results=await Promise.all(
      Object.entries(SB_TABLES).map(async([dbKey,table])=>{
        const{data,error}=await sb.from(table).select('data').order('updated_at',{ascending:false});
        return[dbKey,(data||[]).map(r=>r.data).filter(Boolean)];
      })
    );
    let hasData=false;
    for(const[key,records]of results){
      if(records.length>0){DB[key]=records;hasData=true;}
    }
    if(!hasData)await seedSupabase();
    setSyncDot('ok');
  }catch(e){console.warn('Supabase load error',e);setSyncDot('offline');}
}

async function seedSupabase(){
  for(const[dbKey,table]of Object.entries(SB_TABLES)){
    if(DB[dbKey]&&DB[dbKey].length>0){
      await sb.from(table).upsert(DB[dbKey].map(r=>({id:r.id,data:r,updated_at:new Date().toISOString()})));
    }
  }
}

function setupRealtime(){
  const channel=sb.channel('gmg-realtime');
  Object.entries(SB_TABLES).forEach(([dbKey,table])=>{
    channel.on('postgres_changes',{event:'*',schema:'public',table},payload=>{
      const rec=payload.new?.data;
      if(!rec)return;
      const idx=DB[dbKey].findIndex(r=>r.id===rec.id);
      if(payload.eventType==='DELETE'){if(idx>=0)DB[dbKey].splice(idx,1);}
      else if(idx>=0)DB[dbKey][idx]=rec;
      else DB[dbKey].push(rec);
      renderView();
    });
  });
  channel.subscribe();
}

async function doLogout(){
  await sb.auth.signOut();
  DB=JSON.parse(JSON.stringify(SEED));
  document.getElementById('app').style.display='none';
  document.getElementById('claude-bar').style.display='none';
  document.getElementById('login').style.display='flex';
  showLogin();
}

function generateMentorFee(engId, mentorId){
  const e=DB.engagements.find(x=>x.id===engId); if(!e) return;
  const mentor=DB.contacts.find(c=>c.id===mentorId); if(!mentor) return;
  const client=DB.contacts.find(c=>c.id===e.clientId);
  const today=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const fmt2=n=>'£'+Math.round(n||0).toLocaleString('en-GB');
  const dateLabel=d=>{if(!d) return 'TBC'; const dt=new Date(d); return isNaN(dt)?d:dt.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});};

  let feeSectionHTML='';

  <div class="tabs">

  </div>
  <div class="card">
    <table class="tbl"><thead><tr><th>Engagement</th><th>Date</th><th>Duration</th><th>Status</th><th>Mentor Payment</th><th>Actions</th></tr></thead>
    <tbody>${sess.map(s=>{
      const e=DB.engagements.find(x=>x.id===s.engId);
      const mn=e?DB.contacts.find(m=>m.id===e.mentorId):null;
      const sb={scheduled:'b-blue',completed:'b-green',cancelled:'b-grey'}[s.status];
      return`<tr><td><div style="font-weight:600;font-size:12px">${e?.name||'—'}</div><div style="font-size:10px;color:var(--muted)">${mn?.name||'—'}</div></td>
      <td style="font-size:12px">${s.date}</td>
      <td style="font-size:12px">${s.duration} min</td>
      <td><span class="badge ${sb}">${s.status}</span></td>
      <td>${s.status==='completed'?`<span class="badge ${s.mentorPaid?'b-green':'b-amber'}">${s.mentorPaid?'&#10003; paid':'pending'}</span>`:'<span class="badge b-grey">n/a</span>'}</td>
      <td><div class="acts">
        ${s.status==='scheduled'?`<button class="btn btn-sm btn-success" onclick="completeSession('${s.id}')">&#10003; Complete</button>`:''}
        ${s.status==='completed'&&!s.mentorPaid?`<button class="btn btn-sm btn-warn" onclick="paySession('${s.id}')">Pay Mentor</button>`:''}
        <button class="btn btn-sm btn-outline" onclick="viewSession('${s.id}')">View</button>
      </div></td></tr>`;
    }).join('')}</tbody></table>

function completeSession(id){
  const s=DB.sessions.find(x=>x.id===id); if(!s) return;
  const e=DB.engagements.find(x=>x.id===s.engId);
  s.status='completed';
  if(e){e.sessionsUsed=(e.sessionsUsed||0)+1;}
  DB.mentorPayments.push({id:uid(),mentorId:e?.mentorId,engId:s.engId,sessionId:id,
    amount:e?.sessionRate||0,type:'chair-session',period:s.date.slice(0,7),
    status:'pending',autoBillId:null,xeroSynced:false,created:today()});
  addAct('◷',`Session completed: ${e?.name?.split('—')[0]||''} — mentor payment auto-generated (${fmt(e?.sessionRate||0)})`);
  save(); renderView();
}

function paySession(id){
  const s=DB.sessions.find(x=>x.id===id); if(!s) return;
  const mp=DB.mentorPayments.find(p=>p.sessionId===id);
  if(mp){mp.status='paid';mp.xeroSynced=true;}
  s.mentorPaid=true;
  save(); renderView();
}

function viewSession(id){
  const s=DB.sessions.find(x=>x.id===id); if(!s) return;
  const e=DB.engagements.find(x=>x.id===s.engId);
  const mn=e?DB.contacts.find(m=>m.id===e.mentorId):null;
  showModal(`<div class="mhdr"><h3>Session Detail</h3><button class="mclose" onclick="closeModal()">&#10005;</button></div>
  <div class="mbody">
    <div class="ir"><span class="lbl">Engagement</span><span class="val">${e?.name||'—'}</span></div>
    <div class="ir"><span class="lbl">Mentor</span><span class="val">${mn?.name||'—'}</span></div>
    <div class="ir"><span class="lbl">Date</span><span class="val">${s.date}</span></div>
    <div class="ir"><span class="lbl">Duration</span><span class="val">${s.duration} minutes</span></div>
    <div class="ir"><span class="lbl">Status</span><span class="val"><span class="badge ${s.status==='completed'?'b-green':s.status==='scheduled'?'b-blue':'b-grey'}">${s.status}</span></span></div>
    <div class="ir"><span class="lbl">Mentor Rate</span><span class="val">${fmt(e?.sessionRate||0)}</span></div>
    <div class="ir"><span class="lbl">Payment</span><span class="val"><span class="badge ${s.mentorPaid?'b-green':'b-amber'}">${s.mentorPaid?'Paid':'Pending'}</span></span></div>
    ${s.notes?`<div style="margin-top:12px;padding:10px;background:var(--halfnarrow);border-radius:6px;font-size:12px">${s.notes}</div>`:''}
  </div>`);
}

  <div class="card">

    <tbody>${invs.map(inv=>{

      <td><span class="badge ${sb}">${inv.status}</span></td>
      <td><span class="badge ${inv.xeroSynced?'b-xero':'b-amber'}">${inv.xeroSynced?'&#10003; synced':'pending'}</span></td>

function sendInvoice(id){const i=DB.clientInvoices.find(x=>x.id===id);if(i){i.status='sent';addAct('◎',`Invoice sent: ${fmt(i.amount)} — ${i.period}`);save();renderView();}}
function markPaid(id){const i=DB.clientInvoices.find(x=>x.id===id);if(i){i.status='paid';save();renderView();}}
function pushInvXero(id){const i=DB.clientInvoices.find(x=>x.id===id);if(i){i.xeroSynced=true;addAct('◎',`Invoice pushed to Xero: ${fmt(i.amount)}`);save();renderView();}}
function pushAllXero(){DB.clientInvoices.forEach(i=>{if(!i.xeroSynced)i.xeroSynced=true});addAct('◎','All pending invoices pushed to Xero');save();renderView();}

function runAutoBill(){
  const pending=DB.mentorPayments.filter(p=>p.status==='pending'&&!p.autoBillId);
  if(!pending.length){alert('No pending payments to process.');return;}
  const id=uid();
  const total=pending.reduce((s,p)=>s+p.amount,0);
  pending.forEach(p=>{p.autoBillId=id;p.status='paid';p.xeroSynced=true;});
  DB.autoBills.push({id,period:'2026-06',payments:pending.map(p=>p.id),totalAmount:total,status:'paid',xeroSynced:true,created:today()});
  addAct('◐',`Auto-bill run completed: June 2026 — ${fmt(total)} pushed to Xero`);
  save(); renderView();
  alert('Auto-bill run complete.\n'+pending.length+' payments totalling '+fmt(total)+' pushed to Xero.');
}

h2{font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:10px;padding-bottom:6px;border-bottom:1.5px solid #e5e0d8}
h3{font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
p{margin-bottom:10px;color:#333}
@media print{body{print-color-adjust:exact;-webkit-print-color-adjust:exact}.no-print{display:none!important}.page{padding:24px 32px 40px}}
</style></head>
<body>
<div class="no-print" style="background:#1a1a1a;padding:12px 24px;display:flex;justify-content:space-between;align-items:center">
  <span style="color:#fff;font-size:12px">Statement of Work &mdash; Press &ldquo;Save as PDF&rdquo; or Ctrl+P to export</span>
  <button onclick="window.print()" style="background:#A0191A;color:#fff;border:none;border-radius:5px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer">&#128196; Save as PDF / Print</button>
</div>
<div class="page">

  <!-- HEADER -->
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:20px;border-bottom:2.5px solid #A0191A">
    <div>
      <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:26px;font-weight:700;color:#A0191A;letter-spacing:-0.5px">Global<span style="color:#1a1a1a">Mentors</span>Group</div>
      <div style="font-size:10px;color:#999;margin-top:2px;font-weight:500;letter-spacing:.3px">MENTORING &amp; LEADERSHIP ADVISORY</div>
    </div>
    <div style="text-align:right">
      <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;font-weight:700">Statement of Work</div>
      <div style="font-size:10px;font-weight:700;color:#A0191A;letter-spacing:.5px;margin-top:3px">CONFIDENTIAL</div>
      <div style="font-size:10px;color:#888;margin-top:2px">Ref: ${refNo} &nbsp;&middot;&nbsp; ${today}</div>
    </div>
  </div>

  <!-- PARTIES -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px">
    <div style="padding:16px;background:#f8f6f3;border-left:3px solid #A0191A;border-radius:0 6px 6px 0">
      <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Service Provider</div>
      <div style="font-size:14px;font-weight:700;font-family:'Cormorant Garamond',Georgia,serif">Global Mentors Group</div>
      <div style="font-size:11px;color:#666;margin-top:3px">London, United Kingdom</div>
      <div style="font-size:11px;color:#666">info@globalmentorsgroup.com</div>
    </div>
    <div style="padding:16px;background:#f8f6f3;border-left:3px solid #1a1a1a;border-radius:0 6px 6px 0">
      <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Client</div>
      <div style="font-size:14px;font-weight:700;font-family:'Cormorant Garamond',Georgia,serif">${client?client.name:'[Client Name]'}</div>
      <div style="font-size:11px;color:#666;margin-top:3px">${client?client.org||'':''}</div>
      <div style="font-size:11px;color:#666">${client?client.email||'':''}</div>
    </div>
  </div>

  <!-- ENGAGEMENT DETAILS -->
  <div style="margin-bottom:28px;padding:16px 18px;background:#fff;border:1px solid #e5e0d8;border-radius:6px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div><div style="font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px">Engagement</div><div style="font-size:12px;font-weight:600">${e.name}</div></div>
      <div><div style="font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px">Programme Type</div><div style="font-size:12px;font-weight:600">${e.type.charAt(0).toUpperCase()+e.type.slice(1)} Mentoring</div></div>
      <div><div style="font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px">Lead Mentor</div><div style="font-size:12px;font-weight:600">${mentor?mentor.name:'TBC'}</div></div>
      <div><div style="font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px">Start Date</div><div style="font-size:12px;font-weight:600">${dateLabel(e.startDate)}</div></div>
      <div><div style="font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px">End Date</div><div style="font-size:12px;font-weight:600">${dateLabel(e.endDate)}</div></div>
      <div><div style="font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px">GMG Coordinator</div><div style="font-size:12px;font-weight:600">${e.coordinator||'—'}</div></div>
    </div>
    ${e.notes?`<div style="margin-top:12px;padding-top:10px;border-top:1px solid #e5e0d8;font-size:11px;color:#666"><strong style="color:#1a1a1a">Notes: </strong>${e.notes}</div>`:''}
  </div>

  <!-- 1. SCOPE -->
  <div style="margin-bottom:24px">
    <h2>1. Scope of Services</h2>
    ${scopeHTML}
  </div>

  <!-- 2. DELIVERABLES -->
  <div style="margin-bottom:24px">
    <h2>2. Deliverables</h2>
    <p>GMG will provide the following as part of this engagement:</p>
    <div style="padding:14px 16px;background:#f8f6f3;border-radius:6px;margin-top:8px">
      ${deliverableHTML}
    </div>
  </div>

  <!-- 3. FEE SCHEDULE -->
  <div style="margin-bottom:24px">
    <h2>3. Fee Schedule</h2>
    ${feeHTML}
  </div>

  <!-- 4. TERMS -->
  <div style="margin-bottom:28px">
    <h2>4. Terms &amp; Conditions</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <h3>Confidentiality</h3>
        <p style="font-size:11px">Both parties agree to maintain the confidentiality of all information exchanged during the programme. All sessions, reports, and materials are strictly confidential.</p>
        <h3 style="margin-top:12px">Cancellation</h3>
        <p style="font-size:11px">Sessions cancelled with less than 48 hours' notice may be charged at the full session rate. Programme cancellation requires 30 days' written notice.</p>
      </div>
      <div>
        <h3>Intellectual Property</h3>
        <p style="font-size:11px">All programme materials and reports produced by GMG remain the intellectual property of Global Mentors Group unless otherwise agreed in writing.</p>
        <h3 style="margin-top:12px">Governing Law</h3>
        <p style="font-size:11px">This Statement of Work shall be governed by the laws of England and Wales. Any disputes shall be subject to the exclusive jurisdiction of the English courts.</p>
      </div>
    </div>
  </div>

  <!-- 5. SIGNATURES -->
  <div style="margin-bottom:20px">
    <h2>5. Authorisation</h2>
    <p style="margin-bottom:18px">By signing below, both parties agree to the terms of this Statement of Work.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px">
      <div>
        <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px">For Global Mentors Group</div>
        <div style="border-bottom:1.5px solid #1a1a1a;margin-bottom:6px;height:36px"></div>
        <div style="font-size:11px;font-weight:600">${e.coordinator||'Authorised Signatory'}</div>
        <div style="font-size:10px;color:#888">Global Mentors Group</div>
        <div style="font-size:10px;color:#999;margin-top:8px">Date: ____________________________</div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px">For ${client?client.name:'the Client'}</div>
        <div style="border-bottom:1.5px solid #1a1a1a;margin-bottom:6px;height:36px"></div>
        <div style="font-size:11px;font-weight:600">Authorised Signatory</div>
        <div style="font-size:10px;color:#888">${client?client.name:''}</div>
        <div style="font-size:10px;color:#999;margin-top:8px">Date: ____________________________</div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div style="margin-top:36px;padding-top:16px;border-top:1px solid #ddd;display:flex;justify-content:space-between;font-size:10px;color:#999">
    <span>Global Mentors Group &middot; ${refNo} &middot; ${today}</span>
    <span style="color:#A0191A;font-weight:700">Confidential &mdash; Not for Distribution</span>
  </div>
</div>
</body></html>`;

  const win=window.open('','_blank');
  if(!win){alert('Please allow pop-ups to generate the SOW PDF.');return;}
  win.document.write(html);
  win.document.close();
  setTimeout(()=>win.print(),900);
}

function toggleEngTypeFields(type){
  document.getElementById('em-exec-fields').style.display=type==='executive'?'':'none';
  document.getElementById('em-team-fields').style.display=type==='team'?'':'none';
}

function openProjDetail(id){
  const e=DB.engagements.find(x=>x.id===id); if(!e) return;
  const cl=DB.contacts.find(c=>c.id===e.clientId);
  const stages=e.stages||[];
  const mentorIds=(e.mentorIds&&e.mentorIds.length)?[...e.mentorIds]:e.mentorId?[e.mentorId]:[];
  const mentors=mentorIds.map(mid=>DB.contacts.find(c=>c.id===mid)).filter(Boolean);
  const totalClientFee=stages.reduce((s,st)=>s+(st.clientFee||0),0)||e.totalFee||e.annualFee||0;
  const totalMentorCost=stages.reduce((s,st)=>s+((st.mentorFees||[]).reduce((a,mf)=>a+(mf.fee||0),0)),0);
  const profit=totalClientFee-totalMentorCost;
  const margin=totalClientFee>0?Math.round((profit/totalClientFee)*100):0;
  const costPct=totalClientFee>0?Math.min(100,Math.round((totalMentorCost/totalClientFee)*100)):0;
  const profitPct=totalClientFee>0?Math.max(0,100-costPct):0;
  const stBadge={active:'b-green',planning:'b-amber',completed:'b-grey'}[e.status]||'b-grey';
  const completedStages=stages.filter(s=>s.status==='completed').length;
  const avail=DB.contacts.filter(c=>c.type==='mentor'&&!mentorIds.includes(c.id));
  const stageRows=stages.length>0?stages.map(st=>{
    const stMentorCost=(st.mentorFees||[]).reduce((a,mf)=>a+(mf.fee||0),0);
    const stProfit=(st.clientFee||0)-stMentorCost;
    const pip=st.status==='completed'?'#27ae60':st.status==='active'?'#d68910':'#bdc3c7';
    const sb=st.status==='completed'?'b-green':st.status==='active'?'b-amber':'b-grey';
    const mfStr=(st.mentorFees||[]).map(mf=>{const m=DB.contacts.find(c=>c.id===mf.mentorId);return`${m?m.name.split(' ')[0]:'?'}: ${fmt(mf.fee)}`;}).join(', ')||'—';
    return`<tr>
      <td><div style="display:flex;align-items:center;gap:7px"><div style="width:9px;height:9px;border-radius:50%;background:${pip};flex-shrink:0"></div><span style="font-size:12px;font-weight:600">${st.name}</span></div></td>
      <td><span class="badge ${sb}">${st.status}</span></td>
      <td style="font-size:12px;font-weight:600;color:var(--cadmium)">${fmt(st.clientFee||0)}</td>
      <td style="font-size:11px;color:var(--muted)">${mfStr}</td>
      <td style="font-size:12px;font-weight:600;color:${stProfit>=0?'var(--success)':'#c0392b'}">${fmt(stProfit)}</td>
      <td><div class="acts"><button class="btn btn-sm btn-outline" onclick="openStageModal('${id}','${st.id}')">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteStage('${id}','${st.id}')">&#10005;</button></div></td>
    </tr>`;
  }).join(''):`<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted);font-size:12px">No stages yet &#8212; click + Add Stage below</td></tr>`;
  showModal(`<div class="mhdr"><h3>${e.name}</h3><button class="mclose" onclick="closeModal()">&#10005;</button></div>
  <div class="mbody">
    <div style="display:flex;gap:7px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
      <span class="badge type-team">Team</span><span class="badge ${stBadge}">${e.status}</span>
      ${e.partner?`<span class="badge b-grey">${e.partner}</span>`:''}
      ${cl?`<span style="font-size:11px;color:var(--muted)">Client: <strong style="color:var(--nearblack)">${cl.name}</strong></span>`:''}
      ${e.startDate?`<span style="font-size:11px;color:var(--muted)">${e.startDate}${e.endDate?' &#8594; '+e.endDate:''}</span>`:''}
    </div>
    <div class="fstitle" style="margin-bottom:7px">Team Mentors</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">
      ${mentors.map(m=>`<span class="mentor-tag">${m.name}<button onclick="generateMentorFee('${id}','${m.id}')" title="Fee Summary" style="background:none;border:none;cursor:pointer;font-size:9px;font-weight:700;color:#A0191A;padding:0 2px;margin-left:1px" title="Fee Summary">PDF</button><button onclick="removeProjMentor('${id}','${m.id}')" title="Remove">&#215;</button></span>`).join('')}
      ${mentors.length===0?`<span style="font-size:11px;color:var(--muted)">No mentors assigned</span>`:''}
    </div>
    ${avail.length>0?`<div style="display:flex;gap:6px;margin-bottom:16px">
      <select id="proj-add-mentor" style="font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:5px;background:var(--halfnarrow);color:var(--nearblack)">
        <option value="">Add mentor to project&#8230;</option>
        ${avail.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}
      </select>
      <button class="btn btn-sm btn-outline" onclick="addProjMentor('${id}')">+ Add</button>
    </div>`:`<div style="margin-bottom:16px"></div>`}
    <div class="fstitle" style="margin-bottom:7px">Project Stages (${completedStages}/${stages.length} complete)</div>
    <table class="tbl" style="margin-bottom:10px">
      <thead><tr><th>Stage</th><th>Status</th><th>Client Fee</th><th>Mentor Costs</th><th>Stage Profit</th><th>Actions</th></tr></thead>
      <tbody>${stageRows}</tbody>
      ${stages.length>0?`<tfoot><tr style="background:var(--halfnarrow)"><td colspan="2" style="font-size:12px;font-weight:700">Total</td><td style="font-size:12px;font-weight:700;color:var(--cadmium)">${fmt(totalClientFee)}</td><td style="font-size:12px;font-weight:700">${fmt(totalMentorCost)}</td><td style="font-size:12px;font-weight:700;color:${profit>=0?'var(--success)':'#c0392b'}">${fmt(profit)}</td><td></td></tr></tfoot>`:''}
    </table>
    ${stages.length>0?`<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
        <span style="font-weight:600">Project Profitability</span>
        <span style="font-weight:700;font-size:13px;color:${margin>=0?'var(--success)':'#c0392b'}">${margin}% margin &nbsp;&#183;&nbsp; ${fmt(profit)} profit</span>
      </div>
      <div class="profit-bar-track">
        <div class="pbar-cost" style="width:${costPct}%"></div>
        <div class="pbar-profit" style="width:${profitPct}%"></div>
      </div>
      <div style="display:flex;gap:14px;font-size:10px;margin-top:4px;color:var(--muted)">
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#c0392b;margin-right:3px"></span>Cost ${fmt(totalMentorCost)}</span>
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#27ae60;margin-right:3px"></span>Profit ${fmt(profit)}</span>
      </div>
    </div>`:''}
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:4px">
      <button class="btn btn-primary" onclick="openStageModal('${id}',null)">+ Add Stage</button>
      <button class="btn btn-outline" onclick="openProjTaskModal('${id}')">+ Task</button>
      <button class="btn btn-outline" onclick="closeModal();openEngModal('${id}')">Edit Details</button>
      <button class="btn btn-outline" style="border-color:#5E1100;color:#5E1100" onclick="generateSOW('${id}')">&#128221; SOW</button>
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
    </div>
  </div>`,true);
}

function addProjMentor(engId){
  const e=DB.engagements.find(x=>x.id===engId); if(!e) return;
  const sel=document.getElementById('proj-add-mentor');
  const mid=sel.value; if(!mid) return;
  if(!e.mentorIds) e.mentorIds=[];
  if(e.mentorId&&!e.mentorIds.includes(e.mentorId)) e.mentorIds.unshift(e.mentorId);
  if(!e.mentorIds.includes(mid)) e.mentorIds.push(mid);
  if(!e.mentorId) e.mentorId=mid;
  save();closeModal();openProjDetail(engId);
}

function removeProjMentor(engId,mentorId){
  const e=DB.engagements.find(x=>x.id===engId); if(!e) return;
  e.mentorIds=(e.mentorIds||[]).filter(id=>id!==mentorId);
  if(e.mentorId===mentorId) e.mentorId=e.mentorIds[0]||'';
  save();closeModal();openProjDetail(engId);
}

function openStageModal(engId,stageId){
  const e=DB.engagements.find(x=>x.id===engId); if(!e) return;
  const st=stageId?(e.stages||[]).find(s=>s.id===stageId):null;
  const mentorIds=(e.mentorIds&&e.mentorIds.length)?[...e.mentorIds]:e.mentorId?[e.mentorId]:[];
  const mentors=mentorIds.map(mid=>DB.contacts.find(c=>c.id===mid)).filter(Boolean);
  const mFeeFields=mentors.map(m=>{
    const ex=(st&&st.mentorFees||[]).find(mf=>mf.mentorId===m.id);
    return`<div class="fgrow" style="align-items:center;gap:10px">
      <div style="flex:1;font-size:12px;font-weight:600;min-width:100px">${m.name}</div>
      <div class="fg" style="flex:1"><label>Fee (&#163;)</label><input class="mfee-inp" data-mid="${m.id}" type="number" value="${ex?ex.fee:''}" placeholder="0"></div>
    </div>`;
  }).join('');
  showModal(`<div class="mhdr"><h3>${st?'Edit Stage':'New Stage'}</h3><button class="mclose" onclick="closeModal()">&#10005;</button></div>
  <div class="mbody">
    <div class="fgrow">
      <div class="fg"><label>Stage Name</label><input id="stg-name" type="text" value="${st?st.name:''}" placeholder="e.g. Discovery, Design, Delivery"></div>
      <div class="fg"><label>Status</label><select id="stg-status">
        <option value="pending"${!st||st.status==='pending'?' selected':''}>Pending</option>
        <option value="active"${st&&st.status==='active'?' selected':''}>Active</option>
        <option value="completed"${st&&st.status==='completed'?' selected':''}>Completed</option>
      </select></div>
    </div>
    <div class="fg"><label>Client Fee for this Stage (&#163;)</label><input id="stg-client-fee" type="number" value="${st?st.clientFee:''}" placeholder="0"></div>
    ${mentors.length>0?`<div class="fstitle" style="margin:10px 0 6px">Mentor Fees for this Stage</div>${mFeeFields}`:'<div style="font-size:11px;color:var(--muted);padding:6px 0">Assign mentors to the project first to set their per-stage fees.</div>'}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-outline" onclick="closeModal();openProjDetail('${engId}')">Cancel</button>
      <button class="btn btn-primary" onclick="saveStage('${engId}','${stageId||''}')">Save Stage</button>
    </div>
  </div>`);
}

function saveStage(engId,stageId){
  const e=DB.engagements.find(x=>x.id===engId); if(!e) return;
  const name=document.getElementById('stg-name').value.trim();
  if(!name) return alert('Please enter a stage name.');
  const clientFee=parseFloat(document.getElementById('stg-client-fee').value)||0;
  const status=document.getElementById('stg-status').value;
  const mentorFees=[];
  document.querySelectorAll('.mfee-inp').forEach(inp=>{
    mentorFees.push({mentorId:inp.dataset.mid,fee:parseFloat(inp.value)||0});
  });
  if(!e.stages) e.stages=[];
  if(stageId){
    const idx=e.stages.findIndex(s=>s.id===stageId);
    if(idx!==-1) e.stages[idx]={...e.stages[idx],name,status,clientFee,mentorFees};
  } else {
    e.stages.push({id:uid(),name,status,clientFee,mentorFees});
  }
  save();closeModal();openProjDetail(engId);
}

function deleteStage(engId,stageId){
  if(!confirm('Delete this stage?')) return;
  const e=DB.engagements.find(x=>x.id===engId); if(!e) return;
  e.stages=(e.stages||[]).filter(s=>s.id!==stageId);
  save();closeModal();openProjDetail(engId);
}

/* ── QUOTING ─────────────────────────────────────────────────── */
function rQuoting(c){
  if(!DB.quotes) DB.quotes=[];
  const stFilter=S.tab.quoteSt||'';
  const partFilter=S.tab.quotePart||'';
  let quotes=DB.quotes.filter(q=>{
    if(stFilter&&q.status!==stFilter) return false;
    if(partFilter&&q.partner!==partFilter) return false;
    return true;
  });
  const hasFilter=stFilter||partFilter;
  const totalVal=DB.quotes.reduce((s,q)=>s+q.value,0);
  const approvedVal=DB.quotes.filter(q=>q.status==='approved').reduce((s,q)=>s+q.value,0);
  const stBadgeMap={draft:'b-grey',sent:'b-blue',approved:'b-green',declined:'b-red'};
  c.innerHTML=`
  <div class="phdr"><div><h2>Quoting</h2><p>${DB.quotes.length} quotes · ${fmt(approvedVal)} approved value</p></div>
  <button class="btn btn-primary" onclick="openQuoteModal()">+ New Quote</button></div>
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
    ${[
      {label:'Total Quotes',val:DB.quotes.length,sub:'all time'},
      {label:'Total Value',val:fmt(totalVal),sub:'pipeline'},
      {label:'Approved',val:DB.quotes.filter(q=>q.status==='approved').length,sub:fmt(approvedVal)+' value',cls:'accent'},
      {label:'Awaiting Response',val:DB.quotes.filter(q=>q.status==='sent').length,sub:'sent quotes',cls:'gold'},

function saveQuote(id){
  const name=document.getElementById('qm-name').value.trim();
  if(!name)return alert('Please enter a quote name.');
  const val=parseFloat(document.getElementById('qm-val').value)||0;
  if(id){
    const q=DB.quotes.find(x=>x.id===id);
    if(q){q.name=name;q.clientId=document.getElementById('qm-client').value;q.solution=document.getElementById('qm-sol').value;q.value=val;q.validUntil=document.getElementById('qm-valid').value;q.partner=document.getElementById('qm-partner').value;q.country=document.getElementById('qm-country').value;q.notes=document.getElementById('qm-notes').value.trim();}
  } else {
    DB.quotes.push({id:uid(),name,clientId:document.getElementById('qm-client').value,solution:document.getElementById('qm-sol').value,value:val,status:'draft',date:today(),validUntil:document.getElementById('qm-valid').value,partner:document.getElementById('qm-partner').value,country:document.getElementById('qm-country').value,notes:document.getElementById('qm-notes').value.trim()});
    addAct('◎',`Quote created: ${name} — ${fmt(val)}`);
  }
  save();closeModal();renderView();
}

/* ── PIPELINE ────────────────────────────────────────────────── */
function rPipeline(c){
  if(!DB.opportunities) DB.opportunities=[];
  const partnerF=S.tab.plPartner||'';
  const countryF=S.tab.plCountry||'';
  const solutionF=S.tab.plSolution||'';
  let opps=DB.opportunities.filter(o=>{
    if(partnerF&&o.partner!==partnerF) return false;
    if(countryF&&o.country!==countryF) return false;
    if(solutionF&&o.solution!==solutionF) return false;
    return true;
  });
  const allPartners=[...new Set(DB.opportunities.map(o=>o.partner).filter(Boolean))];
  const allCountries=[...new Set(DB.opportunities.map(o=>o.country).filter(Boolean))];
  const totalVal=DB.opportunities.filter(o=>o.stage!=='Closed Lost').reduce((s,o)=>s+o.value,0);
  const closedWon=DB.opportunities.filter(o=>o.stage==='Closed Won');
  const wonVal=closedWon.reduce((s,o)=>s+o.value,0);
  const openOpps=DB.opportunities.filter(o=>!['Closed Won','Closed Lost'].includes(o.stage));
  const weightedVal=openOpps.reduce((s,o)=>s+(o.value*(o.prob||50)/100),0);
  const hasFilter=partnerF||countryF||solutionF;

  c.innerHTML=`
  <div class="phdr"><div><h2>Pipeline</h2><p>${DB.opportunities.length} opportunities across all stages</p></div>
  <button class="btn btn-primary" onclick="openDealModal()">+ New Deal</button></div>
  <div class="kpi-grid">
    <div class="kpi accent"><div class="kpi-label">Total Pipeline Value</div><div class="kpi-val">${fmt(totalVal)}</div><div class="kpi-sub">${DB.opportunities.length} opportunities</div></div>
    <div class="kpi"><div class="kpi-label">Open Deals</div><div class="kpi-val">${openOpps.length}</div><div class="kpi-sub">${fmt(openOpps.reduce((s,o)=>s+o.value,0))} combined value</div></div>
    <div class="kpi gold"><div class="kpi-label">Closed Won</div><div class="kpi-val">${closedWon.length}</div><div class="kpi-sub">${fmt(wonVal)} total</div></div>
    <div class="kpi"><div class="kpi-label">Weighted Value</div><div class="kpi-val">${fmt(Math.round(weightedVal))}</div><div class="kpi-sub">probability-weighted open pipeline</div></div>
  </div>
  <div class="filter-row" style="margin-bottom:12px">
    <select onchange="S.tab.plPartner=this.value;renderView()">
      <option value="">All Partners</option>
      ${allPartners.map(p=>`<option value="${p}"${partnerF===p?' selected':''}>${p}</option>`).join('')}
    </select>
    <select onchange="S.tab.plCountry=this.value;renderView()">
      <option value="">All Countries</option>
      ${allCountries.map(cn=>`<option value="${cn}"${countryF===cn?' selected':''}>${cn}</option>`).join('')}
    </select>
    <select onchange="S.tab.plSolution=this.value;renderView()">
      <option value="">All Solutions</option>
      <option value="chair"${solutionF==='chair'?' selected':''}>Chair</option>
      <option value="executive"${solutionF==='executive'?' selected':''}>Executive</option>
      <option value="team"${solutionF==='team'?' selected':''}>Team</option>
    </select>
    ${hasFilter?`<button class="filter-clear" onclick="S.tab.plPartner='';S.tab.plCountry='';S.tab.plSolution='';renderView()">&#10005; Clear</button>`:''}
  </div>
  <div class="lc-board">
    ${LC_STAGES.map((stage,i)=>{
      const stageOpps=opps.filter(o=>o.stage===stage);
      const stageVal=stageOpps.reduce((s,o)=>s+o.value,0);
      return`<div class="lc-stage">
        <div class="lc-stage-hdr">
          <div class="lc-stage-num">${i+1}</div>
          <div class="lc-stage-name">${LC_STAGE_LABELS[stage]||stage}</div>
          <div class="lc-stage-count">${stageOpps.length} deal${stageOpps.length!==1?'s':''} · ${fmt(stageVal)}</div>
        </div>
        <div class="lc-cards">
          ${stageOpps.map(o=>{
            const tb={chair:'type-chair',executive:'type-executive',team:'type-team'}[o.solution]||'b-grey';
            return`<div class="lc-card" onclick="openDealModal('${o.id}')">
              <div class="lc-card-name">${o.name}</div>
              <div class="lc-card-meta">${o.client||'—'}<br>${o.partner||'—'} · ${o.country||'—'}</div>
              <div class="lc-card-val">${fmt(o.value)}</div>
              <div class="lc-card-tags"><span class="badge ${tb}" style="font-size:9px">${o.solution}</span></div>
            </div>`;
          }).join('')}
          <button class="lc-add" onclick="openDealModal(null,'${stage}')">+ Add</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function saveDeal(id){
  const name=document.getElementById('dm-name').value.trim();
  if(!name)return alert('Please enter a deal name.');
  const data={name,client:document.getElementById('dm-client').value.trim(),solution:document.getElementById('dm-sol').value,value:parseFloat(document.getElementById('dm-val').value)||0,prob:parseInt(document.getElementById('dm-prob').value)||50,stage:document.getElementById('dm-stage').value,closeDate:document.getElementById('dm-close').value,partner:document.getElementById('dm-partner').value,country:document.getElementById('dm-country').value,notes:document.getElementById('dm-notes').value.trim()};
  if(id){const o=DB.opportunities.find(x=>x.id===id);if(o)Object.assign(o,data);}
  else{DB.opportunities.push({id:uid(),...data,created:today()});addAct('◆',`New deal: ${name} — ${fmt(data.value)}`);}
  save();closeModal();renderView();
}

function toggleTask(id,checked){
  const t=DB.tasks.find(x=>x.id===id);
  if(t){t.status=checked?'done':'todo';save();renderView();}
}
function deleteTask(id){
  if(!confirm('Delete this task?'))return;
  DB.tasks=DB.tasks.filter(t=>t.id!==id);save();renderView();
}

function openTaskModal(id){
  const t=id?DB.tasks.find(x=>x.id===id):null;
  showModal(`<div class="mhdr"><h3>${t?'Edit Task':'New Task'}</h3><button class="mclose" onclick="closeModal()">&#10005;</button></div>
  <div class="mbody">
    <div class="fg"><label>Task Title</label><input id="tm-title" type="text" value="${t?t.title:''}" placeholder="e.g. Send Q3 invoice"></div>
    <div class="fgrow">
      <div class="fg"><label>Type</label><select id="tm-type">
        ${['finance','sessions','pipeline','engagement'].map(tp=>`<option value="${tp}"${t&&t.type===tp?' selected':''}>${tp.charAt(0).toUpperCase()+tp.slice(1)}</option>`).join('')}
      </select></div>
      <div class="fg"><label>Assignee</label><select id="tm-assignee">
        ${PARTNERS.map(p=>`<option value="${p}"${t&&t.assignee===p?' selected':''}>${p}</option>`).join('')}
      </select></div>
    </div>
    <div class="fgrow">
      <div class="fg"><label>Priority</label><select id="tm-pri">
        <option value="high"${t&&t.priority==='high'?' selected':''}>High</option>
        <option value="medium"${!t||t.priority==='medium'?' selected':''}>Medium</option>
        <option value="low"${t&&t.priority==='low'?' selected':''}>Low</option>
      </select></div>
      <div class="fg"><label>Due Date</label><input type="date" id="tm-due" value="${t?t.due:today()}"></div>
    </div>
    ${t?`<div class="fg"><label>Status</label><select id="tm-status">
      <option value="todo"${t.status==='todo'?' selected':''}>To Do</option>
      <option value="inprogress"${t.status==='inprogress'?' selected':''}>In Progress</option>
      <option value="done"${t.status==='done'?' selected':''}>Done</option>
    </select></div>`:''}
    <div class="fg"><label>Notes</label><textarea id="tm-notes" rows="3">${t?t.notes:''}<\/textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask('${id||''}')">Save Task</button>
    </div>
  </div>`);
}

function saveTask(id){
  const title=document.getElementById('tm-title').value.trim();
  if(!title)return alert('Please enter a title.');
  const status=id&&document.getElementById('tm-status')?document.getElementById('tm-status').value:'todo';
  if(id){
    const t=DB.tasks.find(x=>x.id===id);
    if(t){t.title=title;t.type=document.getElementById('tm-type').value;t.assignee=document.getElementById('tm-assignee').value;t.priority=document.getElementById('tm-pri').value;t.due=document.getElementById('tm-due').value;t.status=status;t.notes=document.getElementById('tm-notes').value.trim();}
  } else {
    DB.tasks.unshift({id:uid(),title,type:document.getElementById('tm-type').value,assignee:document.getElementById('tm-assignee').value,priority:document.getElementById('tm-pri').value,due:document.getElementById('tm-due').value,status:'todo',notes:document.getElementById('tm-notes').value.trim(),ref:null});
    addAct('◻',`Task created: ${title}`);
  }
  save();closeModal();renderView();
}

/* ── MENTORS ─────────────────────────────────────────────────── */
function mentorCategory(m){
  const t=(m.title||'').toLowerCase();
  if(/\bchair\b/.test(t) && !/non.exec|former/.test(t)) return 'chair';
  if(/\bchair\b/.test(t) && /former/.test(t)) return 'chair';
  if(/\bchair\b/.test(t)) return 'chair';
  if(/\bceo\b|\bcfo\b|\bcoo\b|\bpresident\b|\bpremier\b|\bminister\b|\bmd\b|\bmanaging director\b|\bchief executive\b/.test(t)) return 'executive';
  if(/former ceo|former president|former md/.test(t)) return 'executive';
  return 'emerging';
}

  const allMentors=DB.contacts.filter(x=>x.type==='mentor');

  <div class="mbody">
    <div class="fg"><label>Engagement Name</label><input id="em-name" type="text" value="${e?e.name:''}" placeholder="e.g. HSBC — Executive Mentoring: J. Smith"></div>

      <div class="fg"><label>Mentor</label><select id="em-mentor">
        <option value="">— Select —</option>

function saveEng(id){
  const n=v=>document.getElementById(v);
  const name=n('em-name').value.trim();
  if(!name) return alert('Please enter an engagement name.');
  const type=n('em-type').value;
  const data={
    name,type,clientId:n('em-client').value,mentorId:n('em-mentor').value,
    status:n('em-status').value,coordinator:n('em-coord').value.trim(),
    partner:n('em-partner').value.trim(),country:n('em-country').value.trim(),
    startDate:n('em-start').value,endDate:n('em-end').value,
    notes:n('em-notes').value.trim(),
  };
  if(type==='chair'){
    data.annualFee=+n('em-annual-fee').value||0;
    data.sessionsIncluded=+n('em-sessions').value||12;
    data.sessionRate=+n('em-session-rate').value||0;
  } else if(type==='executive'){
    data.quarterlyFee=+n('em-qfee').value||0;
    data.annualFee=data.quarterlyFee*4;
    data.retreatDate=n('em-retreat-date')?n('em-retreat-date').value:'';
    data.retreatFee=n('em-retreat-fee')?+n('em-retreat-fee').value||0:0;
  } else {
    data.totalFee=+n('em-total-fee').value||0;
    data.mentorFee=+n('em-mentor-fee').value||0;
    const checks=document.querySelectorAll('.mc-list input:checked');
    data.mentorIds=[...checks].map(cb=>cb.value);
    if(data.mentorIds.length>0) data.mentorId=data.mentorIds[0];
  }
  if(id){
    const idx=DB.engagements.findIndex(x=>x.id===id);
    if(idx>-1) DB.engagements[idx]={...DB.engagements[idx],...data};
    addAct('✏',`Updated: ${name}`);
  } else {
    data.id=uid();data.createdAt=new Date().toISOString().slice(0,10);
    DB.engagements.unshift(data);addAct('◈',`New engagement: ${name}`);
  }
  save();closeModal();renderView();
}


/* ── CLAUDE AI CHAT ─────────────────────────── */
async function claudeAsk(){
  const q=document.getElementById('claude-input').value.trim();
  if(!q)return;
  document.getElementById('claude-input').value='';
  const panel=document.getElementById('claude-panel');
  panel.className='open';
  panel.style.position='fixed';
  document.getElementById('claude-msgs').innerHTML='<div class="cp-q">'+q+'</div><div class="cp-a" id="cp-thinking">Thinking…</div>';
  const key=localStorage.getItem('gmg_claude_key')||'';
  if(!key){
    document.getElementById('claude-msgs').innerHTML='<div class="cp-q">'+q+'</div><div class="cp-a">No API key set — click ⚙ to add your Anthropic API key.</div>';
    return;
  }
  const ctx=`You are a helpful assistant embedded in the GMG Operations Platform for Global Mentors Group. Current data: ${DB.engagements.length} engagements, ${DB.contacts.length} contacts, ${DB.tasks.filter(t=>t.status!=='done').length} open tasks, ${DB.opportunities.filter(o=>!'Closed Won,Closed Lost'.includes(o.stage)).length} active pipeline deals. The user is ${S.user.name} (${ROLES[S.user.role]||S.user.role}). Be concise and helpful.`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-allow-browser':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1024,system:ctx,messages:[{role:'user',content:q}]})
    });
    const d=await resp.json();
    const text=d.content?.[0]?.text||'No response.';
    document.getElementById('claude-msgs').innerHTML='<div class="cp-q">'+q+'</div><div class="cp-a">'+text.replace(/\n/g,'<br>')+'</div>';
  }catch(e){
    document.getElementById('claude-msgs').innerHTML='<div class="cp-q">'+q+'</div><div class="cp-a">Error: '+e.message+'</div>';
  }
}
function claudeClose(){document.getElementById('claude-panel').className='';}
function setClaudeKey(){
  const k=prompt('Enter your Anthropic API key (stored in your browser only):',localStorage.getItem('gmg_claude_key')||'');
  if(k!==null)localStorage.setItem('gmg_claude_key',k.trim());
}

/* ── INIT ──────────────── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();claudeClose();}
});

async function initApp(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){await bootApp(session.user);}
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session)await bootApp(session.user);
    if(event==='SIGNED_OUT'){document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';}
  });
}
initApp();
